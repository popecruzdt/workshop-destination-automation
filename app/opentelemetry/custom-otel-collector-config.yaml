# custom-otel-collector-config.yaml
#
# This file is used as the OpenTelemetry Collector configuration when
# otel_collector_custom_config: true is set during app deployment.
# The collector uses EXACTLY the contents of this file -- no automated
# modifications are applied (e.g. Dynatrace OTLP export is suppressed).
# Edit this file directly to customize the collector configuration.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  prometheus:
    config:
      scrape_configs:
        - job_name: weaviate
          scrape_interval: 15s
          static_configs:
            - targets: ['weaviate:2112']

processors:
  batch:
    timeout: 10s
    send_batch_size: 1024
  cumulativetodelta:

exporters:
  debug:

service:
  telemetry:
    logs:
      level: "info"
      encoding: "json"
    metrics:
      level: "detailed"
      readers:
        - periodic:
            interval: 10000
            timeout: 5000
            exporter:
              otlp:
                protocol: http/protobuf
                temporality_preference: delta
                endpoint: "http://localhost:4318/v1/metrics"
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp, prometheus]
      processors: [cumulativetodelta, batch]
      exporters: [debug]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
