# TODO: pull images from Red Hat repositories for better compatibility with Podman on RHEL-based systems; update image references in this file and related Ansible playbooks accordingly.
version: '3.8'
# Usage (Podman):
# 1. podman build -f Containerfile -t localhost/ai-travel-advisor:latest .
# 2. podman-compose up -d weaviate ollama otel-collector
# 3. podman exec ollama ollama pull gemma2:2b
# 4. podman exec ollama ollama pull nomic-embed-text
# 5. podman-compose up -d travel-advisor nginx
# 6. Edit files under ./destinations or ./prompts on the host as needed.
# 7. Open http://localhost:81

services:
  # Nginx Reverse Proxy
  nginx:
    container_name: travel-advisor-nginx
    image: docker.io/library/nginx:1.27-alpine
    ports:
      - "81:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro,Z
    depends_on:
      - travel-advisor
    networks:
      - travel-advisor-net

  # Weaviate Vector Database
  weaviate:
    container_name: weaviate
    image: cr.weaviate.io/semitechnologies/weaviate:1.30.1
    expose:
      - "8080"
      - "50051"
      - "2112"
    environment:
      PROMETHEUS_MONITORING_ENABLED: 'true'
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_API_BASED_MODULES: 'true'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama'
      AUTOSCHEMA_ENABLED: 'false'
      CLUSTER_HOSTNAME: "node1"
      RAFT_BOOTSTRAP_EXPECT: "1"
      RAFT_JOIN: "node1:8300"
      CLUSTER_GOSSIP_BIND_PORT: "7000"
    volumes:
      - weaviate_data:/var/lib/weaviate:Z
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-advisor-net

  # Ollama LLM Server
  ollama:
    container_name: ollama
    image: docker.io/ollama/ollama:0.18.2
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama:Z
    environment:
      - OLLAMA_KEEP_ALIVE=10m
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - travel-advisor-net
    # Note: Run `podman exec ollama ollama pull gemma2:2b` and
    # `podman exec ollama ollama pull nomic-embed-text` after starting.

  # OpenTelemetry Collector
  otel-collector:
    container_name: otel-collector
    image: ghcr.io/dynatrace/dynatrace-otel-collector/dynatrace-otel-collector:0.45.0
    expose:
      - "4317"
      - "4318"
    volumes:
      - ./opentelemetry/otel-collector-config.yaml:/etc/otel/config.yaml:ro,Z
    command:
      - "--config=/etc/otel/config.yaml"
    networks:
      - travel-advisor-net
    healthcheck:
      test: ["CMD", "/dynatrace-otel-collector", "--version"]
      interval: 10s
      timeout: 5s
      retries: 3

  # AI Travel Advisor Application
  travel-advisor:
    container_name: travel-advisor
    hostname: travel-advisor
    image: localhost/ai-travel-advisor:latest
    expose:
      - "8080"
    environment:
      OLLAMA_ENDPOINT: http://ollama:11434
      WEAVIATE_ENDPOINT: weaviate
      WEAVIATE_PORT: 8080
      AI_MODEL: gemma2:2b
      AI_EMBEDDING_MODEL: nomic-embed-text
      AI_TEMPERATURE: '0.7'
      HOST: travel-advisor
      PORT: 8080
      DEBUG: 'false'
      FORCE_REINDEX: 'false'
      CHUNK_SIZE: '500'
      CHUNK_OVERLAP: '0'
      RETRIEVAL_K: '10'
      MIN_KB_OBJECTS: '450'
      OPENLLMETRY_ENABLED: 'true'
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: ai-travel-advisor
      TRACELOOP_TRACE_CONTENT: 'true'
    depends_on:
      - ollama
      - weaviate
    networks:
      travel-advisor-net:
        aliases:
          - travel-advisor
    volumes:
      - ./destinations:/app/destinations:ro,Z
      - ./prompts:/app/prompts:ro,Z
      - ./src:/app/src:ro,Z
      - ./public:/app/public:ro,Z

volumes:
  weaviate_data:
  ollama_data:

networks:
  travel-advisor-net:
    driver: bridge


