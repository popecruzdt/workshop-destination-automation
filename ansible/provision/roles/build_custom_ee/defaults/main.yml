---
# build_custom_ee role defaults

# Primary Podman EE naming (local Hub ee-supported-rhel9 base)
ee_image_name: "destination-automation-podman-ee"
ee_image_tag: "latest"

# Local build output tag
ee_output_image: "localhost/{{ ee_image_name }}:{{ ee_image_tag }}"

# Registry and certificate handling
ee_registry_host: >-
  {{
    lookup('ansible.builtin.env', 'AAP_PRIVATE_HOSTNAME')
    | default(ansible_fqdn, true)
    | default(ansible_hostname, true)
    | default(lookup('ansible.builtin.env', 'EE_REGISTRY_HOST'), true)
    | default('localhost', true)
  }}
ee_registry_validate_certs: "{{ (lookup('ansible.builtin.env', 'EE_REGISTRY_VALIDATE_CERTS') | default('false', true)) | bool }}"

# Community Podman EE naming (creator-ee base)
ee_podman_community_image_name: "destination-automation-podman-community-ee"
ee_podman_community_image_tag: "latest"
ee_podman_community_output_image: "localhost/{{ ee_podman_community_image_name }}:{{ ee_podman_community_image_tag }}"
ee_podman_community_registry_image: "{{ ee_registry_host }}/{{ ee_podman_community_image_name }}:{{ ee_podman_community_image_tag }}"

# Community Podman EE base image - creator-ee includes containers.podman out of the box
ee_base_image: "quay.io/ansible/creator-ee:latest"
ee_package_manager_path: "/usr/bin/microdnf"

# Local Hub registry details
ee_registry_username: "{{ lookup('ansible.builtin.env', 'EE_REGISTRY_USERNAME') | default('admin', true) }}"
ee_registry_password: "{{ lookup('ansible.builtin.env', 'EE_REGISTRY_PASSWORD') | default(lookup('ansible.builtin.env', 'AAP_ADMIN_PASSWORD') | default('', true), true) }}"
ee_registry_image: "{{ ee_registry_host }}/{{ ee_image_name }}:{{ ee_image_tag }}"
ee_push_to_registry: "{{ (lookup('ansible.builtin.env', 'EE_PUSH_TO_REGISTRY') | default('true', true)) | bool }}"

# OneAgent EE naming and base image
# Default pulls ee-supported-rhel9:latest from the local Automation Hub registry.
# If pulling direct from Red Hat registry instead, use the :2.0 tag — that is the
# version tested with this role:
#   export EE_ONEAGENT_BASE_IMAGE="registry.redhat.io/ansible-automation-platform-25/ee-supported-rhel9:2.0"
ee_oneagent_image_name: "destination-automation-oneagent-ee"
ee_oneagent_image_tag: "latest"
ee_oneagent_output_image: "localhost/{{ ee_oneagent_image_name }}:{{ ee_oneagent_image_tag }}"
ee_oneagent_base_image: >-
  {{ lookup('ansible.builtin.env', 'EE_ONEAGENT_BASE_IMAGE') | default(ee_registry_host + '/ee-supported-rhel9:latest', true) }}
ee_oneagent_package_manager_path: "/usr/bin/dnf"
ee_oneagent_registry_image: "{{ ee_registry_host }}/{{ ee_oneagent_image_name }}:{{ ee_oneagent_image_tag }}"

# Primary local-registry Podman EE base image
# Default pulls ee-supported-rhel9:latest from the local Automation Hub registry.
# If pulling direct from Red Hat registry instead, use the :2.0 tag — that is the
# version tested with this role:
#   export EE_LOCAL_PODMAN_BASE_IMAGE="registry.redhat.io/ansible-automation-platform-25/ee-supported-rhel9:2.0"
ee_local_podman_image_name: "{{ ee_image_name }}"
ee_local_podman_image_tag: "latest"
ee_local_podman_output_image: "localhost/{{ ee_local_podman_image_name }}:{{ ee_local_podman_image_tag }}"
ee_local_podman_base_image: >-
  {{ lookup('ansible.builtin.env', 'EE_LOCAL_PODMAN_BASE_IMAGE') | default(ee_registry_host + '/ee-supported-rhel9:latest', true) }}
ee_local_podman_package_manager_path: "/usr/bin/dnf"
ee_local_podman_registry_image: "{{ ee_registry_host }}/{{ ee_local_podman_image_name }}:{{ ee_local_podman_image_tag }}"

# Build working directory
ee_build_work_dir: "/tmp/ee-build-{{ ansible_date_time.iso8601_basic_short }}"

# ansible-builder controls
# Pinned to stable 3.x release for reproducible builds
ee_ansible_builder_package: "ansible-builder==3.1.1"
ee_builder_verbosity: 3

# Collection versions / profile definitions
ee_podman_collection_version: "1.15.0"
# Latest published version on Galaxy is 1.2.5; >=1.6.0 cannot be resolved.
ee_oneagent_collection_version: "1.2.5"

ee_build_profiles:
  - key: "podman"
    name: "{{ ee_local_podman_image_name }}"
    description: "Custom EE with containers.podman collection (local Hub ee-supported-rhel9 base)"
    output_image: "{{ ee_local_podman_output_image }}"
    registry_image: "{{ ee_local_podman_registry_image }}"
    base_image: "{{ ee_local_podman_base_image }}"
    package_manager_path: "{{ ee_local_podman_package_manager_path }}"
    # ee-supported-rhel9 carries additional preinstalled collections whose
    # transitive dependencies still get introspected during the build, so this
    # profile needs the same native package bootstrap as the oneagent profile.
    additional_build_steps:
      prepend_builder:
        - RUN /usr/bin/microdnf install -y dnf systemd-devel libxml2-devel && /usr/bin/microdnf clean all
      prepend_final:
        - RUN /usr/bin/microdnf install -y dnf gcc krb5-devel libssh-devel python3-Cython python3.12-devel systemd-devel libxml2-devel && ln -sf /usr/bin/python3.12 /usr/bin/python3 && /usr/bin/microdnf clean all
    collections:
      - name: "containers.podman"
        version: "{{ ee_podman_collection_version }}"
  - key: "oneagent"
    name: "{{ ee_oneagent_image_name }}"
    description: "Custom EE with dynatrace.oneagent collection (ee-supported-rhel9 base)"
    output_image: "{{ ee_oneagent_output_image }}"
    registry_image: "{{ ee_oneagent_registry_image }}"
    base_image: "{{ ee_oneagent_base_image }}"
    package_manager_path: "{{ ee_oneagent_package_manager_path }}"
    # ee-supported-rhel9 ships microdnf only; ansible-builder's assemble script
    # detects RHEL 9 and calls /usr/bin/dnf which is absent.  Install it first.
    # systemd-devel provides libsystemd.pc required to build systemd-python
    # (pulled in by the ansible.eda collection present in the base image).
    additional_build_steps:
      prepend_builder:
        - RUN /usr/bin/microdnf install -y dnf systemd-devel libxml2-devel && /usr/bin/microdnf clean all
      prepend_final:
        - RUN /usr/bin/microdnf install -y dnf gcc krb5-devel libssh-devel python3-Cython python3.12-devel systemd-devel libxml2-devel && ln -sf /usr/bin/python3.12 /usr/bin/python3 && /usr/bin/microdnf clean all
    collections:
      - name: "dynatrace.oneagent"
        version: "{{ ee_oneagent_collection_version }}"
  - key: "podman_community"
    name: "{{ ee_podman_community_image_name }}"
    description: "Custom EE with containers.podman collection (creator-ee base)"
    output_image: "{{ ee_podman_community_output_image }}"
    registry_image: "{{ ee_podman_community_registry_image }}"
    base_image: "{{ ee_base_image }}"
    package_manager_path: "{{ ee_package_manager_path }}"
    collections: []
