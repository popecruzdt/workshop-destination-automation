---
- name: Discover extracted installer directories
  ansible.builtin.find:
    paths: "{{ aap_install_dir }}"
    patterns:
      - 'ansible-automation-platform-containerized-setup-bundle*'
    file_type: directory
    recurse: false
  register: aap_hub_seed_installer_dirs

- name: Resolve extracted installer and bundle paths for hub seeding
  ansible.builtin.set_fact:
    aap_seed_installer_extracted_dir: >-
      {{
        aap_installer_extracted_dir
        if (aap_installer_extracted_dir is defined and aap_installer_extracted_dir | length > 0)
        else (
          aap_installer_extracted_dir_override
          if (aap_installer_extracted_dir_override | length > 0)
          else (
            aap_hub_seed_installer_dirs.files
            | map(attribute='path')
            | sort
            | first
            | default('')
          )
        )
      }}
    aap_seed_bundle_dir: >-
      {{
        aap_bundle_dir
        if (aap_bundle_dir is defined and aap_bundle_dir | length > 0)
        else (
          aap_bundle_dir_override
          if (aap_bundle_dir_override | length > 0)
          else (aap_seed_installer_extracted_dir + '/bundle')
        )
      }}
    aap_seed_inner_playbook_path: >-
      {{ (role_path | dirname | dirname) + '/playbooks/seed_hub_collections_inner.yml' }}

- name: Assert generated installer inventory exists
  ansible.builtin.stat:
    path: "{{ aap_inventory_output_path }}"
  register: aap_hub_seed_inventory_stat

- name: Assert extracted installer directory exists
  ansible.builtin.stat:
    path: "{{ aap_seed_installer_extracted_dir }}"
  register: aap_hub_seed_installer_dir_stat

- name: Assert bundle collections directory exists
  ansible.builtin.stat:
    path: "{{ aap_seed_bundle_dir }}/collections"
  register: aap_hub_seed_bundle_collections_stat

- name: Validate Automation Hub seeding prerequisites
  ansible.builtin.assert:
    that:
      - aap_install_user | lower != 'root'
      - aap_hub_seed_inventory_stat.stat.exists
      - aap_hub_seed_installer_dir_stat.stat.exists
      - aap_hub_seed_bundle_collections_stat.stat.exists
      - aap_bundle_install | bool
    fail_msg: >-
      Automation Hub seeding requires an existing AAP containerized install,
      a generated installer inventory at {{ aap_inventory_output_path }}, and
      bundled collections under {{ aap_seed_bundle_dir }}/collections.

- name: Resolve hub seed log path
  ansible.builtin.set_fact:
    aap_effective_hub_seed_log_path: >-
      {{
        aap_hub_seed_log_path
        if (aap_hub_seed_log_path | length > 0)
        else (aap_seed_installer_extracted_dir + '/aap_hub_seed.log')
      }}

- name: Ensure hub seed log file exists and is user-owned
  ansible.builtin.file:
    path: "{{ aap_effective_hub_seed_log_path }}"
    state: touch
    owner: "{{ aap_install_user }}"
    group: "{{ aap_install_user }}"
    mode: "0644"

- name: Announce Automation Hub seeding execution context
  ansible.builtin.debug:
    msg: >-
      Running Automation Hub bundled collection seeding only as non-root user
      '{{ aap_install_user }}'. This does not rerun the full AAP installer.

- name: Announce Automation Hub seeding log monitoring
  ansible.builtin.debug:
    msg: >-
      Hub seeding output will be written to {{ aap_effective_hub_seed_log_path }}.
      This role will print recent log excerpts every {{ aap_installer_monitor_delay }}
      seconds while seeding is running.

- name: Run Automation Hub bundled collection seeding only
  ansible.builtin.shell: >-
    ansible-playbook
    -i {{ aap_inventory_output_path }}
    {{ aap_seed_inner_playbook_path }}
    > {{ aap_effective_hub_seed_log_path }} 2>&1
  args:
    chdir: "{{ aap_seed_installer_extracted_dir }}"
    executable: /bin/bash
  environment:
    XDG_DATA_HOME: "{{ aap_xdg_data_home }}"
  become: true
  become_user: "{{ aap_install_user }}"
  async: 14400
  poll: 0
  register: aap_hub_seed_async
  changed_when: true

- name: Monitor Automation Hub seeding progress
  ansible.builtin.include_tasks: monitor_hub_seed.yml