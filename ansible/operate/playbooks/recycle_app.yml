---
# =============================================================
# Recycle App Playbook
# Stops all easyTravel containers then brings them back up,
# forcing recreation of the travel-advisor container so that
# updated env vars (AI_MODEL, AI_TEMPERATURE, RAG instructions)
# from the deploy inventory are applied without a full re-deploy.
#
# Use this after running the automate-app-ai job templates to
# apply the new AI configuration to a running stack.
#
# Usage:
#   ansible-playbook operate/playbooks/recycle_app.yml
# =============================================================

- import_playbook: stop_app.yml

- name: "Workshop | Recycle easyTravel Application Stack"
  hosts: "{{ target_hosts | default('localhost') }}"
  gather_facts: false

  vars_files:
    - "../../deploy/inventories/localhost/group_vars/all.yml"

  tasks:
    - name: "Recycle application stack with podman_operate role"
      ansible.builtin.include_role:
        name: podman_operate
      vars:
        podman_operate_action: recycle
