---
# Dynatrace platform connection (injected by Monaco credential)
dynatrace_edgeconnect_platform_url: "{{ lookup('ansible.builtin.env', 'DT_PLATFORM_URL') | default('', true) }}"

# OAuth credentials (injected by Dynatrace OAuth Client credential)
# IMPORTANT: Use the OAuth client auto-generated by the EdgeConnect Settings app in the
# Dynatrace UI — NOT an OAuth client created through the Account Management Portal.
# The auto-generated client has the correct scopes and resource binding pre-configured.
# Required OAuth client scopes:
#   app-engine:edge-connects:connect, app-engine:edge-connects:read,
#   app-engine:edge-connects:write, app-engine:edge-connects:delete,
#   settings:objects:read, settings:objects:write, settings:schemas:read,
#   oauth2:clients:manage
dynatrace_edgeconnect_oauth_client_id: "{{ lookup('ansible.builtin.env', 'DT_OAUTH_CLIENT_ID') | default('', true) }}"
dynatrace_edgeconnect_oauth_client_secret: "{{ lookup('ansible.builtin.env', 'DT_OAUTH_CLIENT_SECRET') | default('', true) }}"
dynatrace_edgeconnect_oauth_account_urn: "{{ lookup('ansible.builtin.env', 'DT_OAUTH_ACCOUNT_URN') | default('', true) }}"

# OAuth token endpoint (overridable)
dynatrace_edgeconnect_oauth_endpoint: "https://sso.dynatrace.com/sso/oauth2/token"

# TLS certificate validation
dynatrace_edgeconnect_validate_certs: true

# EdgeConnect API registration settings
# host_patterns: list of DNS wildcard patterns this EdgeConnect will resolve (e.g. ["*.internal.org"])
# host_mappings: list of {from, to} DNS rewrites (e.g. [{from: "old.host", to: "new.host"}])
# These are passed to POST /platform/app-engine/edge-connect/v1/edge-connects at registration time.
# If oauthClientId is empty, Dynatrace auto-generates OAuth credentials — the secret is returned
# once in the registration response and is NOT retrievable later. Requires the
# oauth2:clients:manage scope on the OAuth client if auto-generating.
dynatrace_edgeconnect_host_patterns: []
dynatrace_edgeconnect_host_mappings: []

# EdgeConnect deployment settings
dynatrace_edgeconnect_name: "destination-automation-edgeconnect"
dynatrace_edgeconnect_image: "docker.io/dynatrace/edgeconnect:latest"
dynatrace_edgeconnect_container_name: "edgeconnect"
dynatrace_edgeconnect_config_dir: "{{ destination_automation_base_dir | default('/home/aap-service-account/destination-automation', true) }}/edgeconnect"

# Host restriction list — passed via JT extra_var (e.g. [aap_local_private_hostname])
# Default uses host.containers.internal for rootless Podman container-to-host communication,
# which works regardless of whether AAP and workshop are on same or different machines.
# This uses Podman's standard host alias (169.254.1.2 in pasta mode) instead of FQDN.
dynatrace_edgeconnect_restrict_hosts_to:
  - "host.containers.internal"
