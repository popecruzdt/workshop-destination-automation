# =============================================================
# EDA Controller configuration
# =============================================================

# EDA Controller connection (AAP 2.5+ gateway routes EDA at the same host)
aap_eda_controller_host: "{{ aap_controller_host }}"
aap_eda_controller_username: "{{ aap_controller_username }}"
aap_eda_controller_password: "{{ aap_controller_password }}"
aap_eda_controller_validate_certs: "{{ aap_controller_validate_certs }}"

# Dynatrace Decision Environment
aap_dt_de_name: "destination-automation-dt-de"
aap_dt_de_description: "Decision Environment with Dynatrace EDA collection (de-supported-rhel9 base)"
aap_dt_de_image: "{{ aap_custom_ee_registry_host }}/destination-automation-dt-de:latest"

# EDA Project
# Set EDA_PROJECT_PUBLIC=false to use private repo with SCM credentials.
# Set EDA_PROJECT_GIT_URL to override the default repository URL.
# Set EDA_PROJECT_SCM_USERNAME and EDA_PROJECT_SCM_TOKEN for private repo access.
aap_eda_project_public: "{{ (lookup('ansible.builtin.env', 'EDA_PROJECT_PUBLIC') | default('true', true)) | bool }}"
aap_eda_project_name: "destination-automation"
aap_eda_project_description: "Workshop EDA rulebooks project"
aap_eda_project_url: "{{ lookup('ansible.builtin.env', 'EDA_PROJECT_GIT_URL') | default('https://github.com/dynatrace-wwse/workshop-destination-automation.git', true) }}"
aap_eda_scm_username: "{{ lookup('ansible.builtin.env', 'EDA_PROJECT_SCM_USERNAME') | default('', true) }}"
aap_eda_scm_token: "{{ lookup('ansible.builtin.env', 'EDA_PROJECT_SCM_TOKEN') | default('', true) }}"
aap_eda_scm_credential_name: "destination-automation-github"
aap_eda_aap_credential_name: "destination-automation-aap"
# Host URL used inside the EDA AAP credential — must be reachable from inside the DE container.
# AAP 2.6 requires the /api/controller/ path suffix so ansible-rulebook probes the correct endpoint.
aap_eda_aap_credential_host: >-
  {{
    ('https://' + (
      lookup('ansible.builtin.env', 'AAP_PRIVATE_HOSTNAME')
      | default(ansible_fqdn, true)
      | default(ansible_hostname, true)
      | default(lookup('ansible.builtin.env', 'AAP_PUBLIC_HOSTNAME'), true)
      | default('localhost', true)
    ))
    | regex_replace('/$', '') + '/api/controller/'
  }}

# EDA Rulebook activation — Dynatrace webhook remediation
aap_eda_activation_name: "destination-automation-dt-webhook-remediate"
aap_eda_activation_description: "Listens for Dynatrace webhook events and triggers embedding model remediation"
aap_eda_activation_rulebook: "dt_webhook_rulebook.yml"
aap_eda_activation_enabled: true
# Webhook port exposed by the rulebook activation
aap_eda_activation_dt_webhook_port: 5000
# Optional bearer token for authenticating incoming Dynatrace webhook requests
aap_eda_activation_dt_webhook_token: "dyn@tr@c3"
aap_eda_activation_extra_vars:
  dt_webhook_port: "{{ aap_eda_activation_dt_webhook_port }}"
  dt_webhook_token: "{{ aap_eda_activation_dt_webhook_token }}"
