# Job template for app AI destinations automation
aap_automate_app_ai_destinations_job_template_name: "destination-automation-automate-app-ai-destinations"
aap_automate_app_ai_destinations_job_template_description: "Generates travel destination HTML files for the travel-advisor app"
aap_automate_app_ai_destinations_job_template_playbook: "automate/playbooks/configure_app_ai_destinations.yml"
aap_automate_app_ai_destinations_job_template_credential: "{{ aap_machine_credential_name }}"
aap_automate_app_ai_destinations_job_template_become_enabled: false
aap_automate_app_ai_destinations_job_template_ask_variables_on_launch: true
# Extra var for destination list
# travel_destinations: List of destination objects. Each entry requires 'name' (display name) and 'details' (context paragraph).
aap_automate_app_ai_destinations_job_template_extra_vars:
  target_hosts: "{{ aap_job_template_target_hosts }}"
  travel_destinations:
    - name: "London"
      details: >-
        London is a newly established city in England. In 2026 they opened their first airport
        on the River Thames where every incoming flight must fly under the London Bridge.
        It never rains in London, it's always sunny and warm.
# YAML string version — comments are preserved when patched directly to the AAP API
aap_automate_app_ai_destinations_job_template_extra_vars_yaml: |
  # List of travel destinations. Each entry requires 'name' and 'details'.
  # Add, remove, or modify entries — each destination becomes a separate HTML file.
  travel_destinations:
    - name: "London"
      details: >-
        London is a newly established city in England. In 2026 they opened their first airport
        on the River Thames where every incoming flight must fly under the London Bridge.
        It never rains in London, it's always sunny and warm.
  target_hosts: "{{ aap_job_template_target_hosts }}"

