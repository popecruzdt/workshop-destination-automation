# Job template for app AI runtime automation
aap_automate_app_ai_runtime_job_template_name: "destination-automation-automate-app-ai-runtime"
aap_automate_app_ai_runtime_job_template_description: "Automates AI model, temperature, and RAG instruction updates"
aap_automate_app_ai_runtime_job_template_playbook: "automate/playbooks/configure_app_ai_runtime.yml"
aap_automate_app_ai_runtime_job_template_credential: "{{ aap_machine_credential_name }}"
aap_automate_app_ai_runtime_job_template_become_enabled: false
aap_automate_app_ai_runtime_job_template_ask_variables_on_launch: true
# Extra vars for app AI runtime configuration
# app_ai_model_requested: Specify the Ollama model to use. Supported models: qwen2.5:0.5b-instruct-q4_K_M, llama3.2:1b-instruct-q4_K_M, gemma3:1b-it-qat, orca-mini:3b
# app_ai_temperature_requested: Set the LLM temperature (randomness). Min: 0.0 (deterministic), Max: 2.0 (very creative). Example: 0.7
# app_ai_rag_instructions_content: System prompt/instructions for the LLM. The model uses this as context for generating responses. Supports multi-line text.
aap_automate_app_ai_runtime_job_template_extra_vars:
  target_hosts: "{{ aap_job_template_target_hosts }}"
  app_ai_model_requested: "gemma2:2b"
  app_ai_temperature_requested: "0.7"
  app_ai_rag_instructions_content: |
    You are a helpful travel advisor assistant. Use ONLY the information provided in the context below to answer questions about travel destinations.

    CRITICAL INSTRUCTIONS:
    - Use ONLY the facts from the context provided below
    - Do NOT use any external knowledge or information you may have
    - If the context contains information about the location, use it exactly as written
    - If the context does not contain relevant information, say "I don't have information about that destination"
    - Keep your response concise and helpful, maximum 50 words
    - Emphasize any information you have about Dynatrace or Red Hat
    - Do not include any emojis, markdown, or formatting in your response

    <context>
    {context}
    </context>

    Question: {destination}

    Travel Advice:
# YAML string version — comments are preserved when patched directly to the AAP API
aap_automate_app_ai_runtime_job_template_extra_vars_yaml: |
  # Ollama model identifier. Supported: qwen2.5:0.5b-instruct-q4_K_M, llama3.2:1b-instruct-q4_K_M, gemma3:1b-it-qat, orca-mini:3b
  app_ai_model_requested: "gemma3:1b-it-qat"
  # LLM temperature/creativity level. Range: 0.0 (deterministic) to 2.0 (very creative). Typical: 0.2-1.0
  app_ai_temperature_requested: "0.7"
  # Multi-line system prompt/instructions for the LLM. Used as context for generating responses.
  app_ai_rag_instructions_content: |
    You are a helpful travel advisor assistant. Use ONLY the information provided in the context below to answer questions about travel destinations.

    CRITICAL INSTRUCTIONS:
    - Use ONLY the facts from the context provided below
    - Do NOT use any external knowledge or information you may have
    - If the context contains information about the location, use it exactly as written
    - If the context does not contain relevant information, say "I don't have information about that destination"
    - Keep your response concise and helpful, maximum 50 words
    - Emphasize any information you have about Dynatrace or Red Hat
    - Do not include any emojis, markdown, or formatting in your response

    <context>
    {context}
    </context>

    Question: {destination}

    Travel Advice:
  target_hosts: "{{ aap_job_template_target_hosts }}"

