---
- name: "aap_config | Create destination-automation organization"
  awx.awx.organization:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_org_name }}"
    description: "{{ aap_org_description }}"
    galaxy_credentials:
      - "{{ aap_galaxy_credential_name }}"
    state: present

- name: "aap_config | Query existing aap-service-account credential"
  ansible.builtin.uri:
    url: "{{ aap_controller_host }}{{ aap_controller_api_prefix }}v2/credentials/?name={{ aap_machine_credential_name | urlencode }}&organization__name={{ aap_org_name | urlencode }}"
    method: GET
    user: "{{ aap_controller_username }}"
    password: "{{ aap_controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ aap_controller_validate_certs }}"
    return_content: true
    status_code: 200
  register: aap_machine_credential_query
  changed_when: false

- name: "aap_config | Record aap-service-account credential presence"
  ansible.builtin.set_fact:
    aap_machine_credential_exists: "{{ (aap_machine_credential_query.json.count | default(0)) | int > 0 }}"

- name: "aap_config | Create Machine credential for aap-service-account"
  awx.awx.credential:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_machine_credential_name }}"
    description: "{{ aap_machine_credential_description }}"
    organization: "{{ aap_org_name }}"
    credential_type: "Machine"
    update_secrets: "{{ aap_machine_credential_overwrite }}"
    inputs: >-
      {{
        {
          'username': aap_machine_credential_username,
          'ssh_key_data': aap_machine_credential_ssh_key,
          'ssh_key_unlock': aap_machine_credential_ssh_key_unlock
        }
        if aap_machine_credential_overwrite
        else (
          {
            'username': aap_machine_credential_username
          }
          if not aap_machine_credential_exists
          else omit
        )
      }}

    state: present

- name: "aap_config | Create Dynatrace Monaco custom credential type"
  awx.awx.credential_type:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_dynatrace_monaco_credential_type_name }}"
    description: "{{ aap_dynatrace_monaco_credential_type_description }}"
    kind: "{{ aap_dynatrace_monaco_credential_type_kind }}"
    inputs: "{{ aap_dynatrace_monaco_credential_type_inputs }}"
    injectors: "{{ aap_dynatrace_monaco_credential_type_injectors }}"
    state: present

- name: "aap_config | Query existing Dynatrace Monaco credential"
  ansible.builtin.uri:
    url: "{{ aap_controller_host }}{{ aap_controller_api_prefix }}v2/credentials/?name={{ aap_dynatrace_monaco_credential_name | urlencode }}&organization__name={{ aap_org_name | urlencode }}"
    method: GET
    user: "{{ aap_controller_username }}"
    password: "{{ aap_controller_password }}"
    force_basic_auth: true
