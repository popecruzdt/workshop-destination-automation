- name: "aap_config | Display OneAgent EE registration result"
  ansible.builtin.debug:
    msg: "OneAgent EE registered: {{ aap_oneagent_ee_result.id }}"
  when: aap_oneagent_ee_result.id is defined

- name: "aap_config | Create local manual project"
  awx.awx.project:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_project_name }}"
    description: "{{ aap_project_description }}"
    organization: "{{ aap_org_name }}"
    scm_type: manual
    local_path: "{{ aap_local_project_path_name }}"
    state: present
  when: aap_deploy_mode == 'local'

- name: "aap_config | Create external git project"
  awx.awx.project:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_project_name }}"
    description: "{{ aap_project_description }}"
    organization: "{{ aap_org_name }}"
    scm_type: "{{ aap_external_project_scm_type }}"
    scm_url: "{{ aap_external_project_scm_url }}"
    scm_branch: "{{ aap_external_project_scm_branch }}"
    credential: "{{ aap_external_project_scm_credential if (aap_external_project_scm_credential | length > 0) else omit }}"
    update_project: true
    state: present
  when: aap_deploy_mode == 'external'

- name: "aap_config | Create destination-automation inventory"
  awx.awx.inventory:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_inventory_name }}"
    organization: "{{ aap_org_name }}"
    description: "{{ aap_inventory_description }}"
    state: present

- name: "aap_config | Add localhost to inventory for local mode"
  awx.awx.host:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_local_inventory_host_name }}"
    inventory: "{{ aap_inventory_name }}"
    description: "Local workshop target host"
    variables: "{{ aap_local_inventory_host_vars }}"
    state: present
  when: aap_deploy_mode == 'local'

- name: "aap_config | Remove legacy localhost host in local mode"
  awx.awx.host:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "localhost"
    inventory: "{{ aap_inventory_name }}"
    state: absent
  when:
    - aap_deploy_mode == 'local'
    - aap_local_inventory_host_name != 'localhost'

- name: "aap_config | Add external hosts to inventory"
  awx.awx.host:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ item.name }}"
    inventory: "{{ aap_inventory_name }}"
    description: "{{ item.description | default('External workshop target', true) }}"
    variables: >-
      {{
        item.variables
        if (item.variables is defined and item.variables is mapping)
        else ((item.variables | default('{}', true)) | from_yaml)
      }}
    state: present
  loop: "{{ aap_external_inventory_hosts }}"
  when: aap_deploy_mode == 'external'

- name: "aap_config | Create workshop group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_workshop_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    description: "{{ aap_workshop_group_description }}"
    state: present

- name: "aap_config | Add local host to workshop group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_workshop_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    hosts:
      - "{{ aap_local_inventory_host_name }}"
    state: present
  when: aap_deploy_mode == 'local'

- name: "aap_config | Add external hosts to workshop group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_workshop_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    hosts: "{{ aap_external_inventory_hosts | map(attribute='name') | list }}"
    state: present
  when:
    - aap_deploy_mode == 'external'
    - (aap_external_inventory_hosts | length > 0)

- name: "aap_config | Create destination-automation group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_dynatrace_target_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    description: "Dynatrace OneAgent deployment targets"
    state: present

- name: "aap_config | Add local host to destination-automation group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_dynatrace_target_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    hosts:
      - "{{ aap_local_inventory_host_name }}"
    state: present
  when: aap_deploy_mode == 'local'

- name: "aap_config | Add external hosts to destination-automation group"
  awx.awx.group:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_dynatrace_target_group_name }}"
    inventory: "{{ aap_inventory_name }}"
    hosts: "{{ aap_external_inventory_hosts | map(attribute='name') | list }}"
    state: present
  when:
    - aap_deploy_mode == 'external'
    - (aap_external_inventory_hosts | length > 0)

- name: "aap_config | Create healthcheck domain label"
  awx.awx.label:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    organization: "{{ aap_org_name }}"
    name: "{{ aap_healthcheck_domain_label }}"
    state: present

- name: "aap_config | Create readiness label"
  awx.awx.label:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    organization: "{{ aap_org_name }}"
    name: "{{ aap_readiness_label }}"
