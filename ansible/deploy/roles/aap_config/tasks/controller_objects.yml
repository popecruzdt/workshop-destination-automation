  register: aap_dynatrace_monaco_credential_query
  changed_when: false

- name: "aap_config | Record Dynatrace Monaco credential presence"
  ansible.builtin.set_fact:
    aap_dynatrace_monaco_credential_exists: "{{ (aap_dynatrace_monaco_credential_query.json.count | default(0)) | int > 0 }}"

- name: "aap_config | Create Dynatrace Monaco credential object"
  awx.awx.credential:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_dynatrace_monaco_credential_name }}"
    description: "{{ aap_dynatrace_monaco_credential_description }}"
    organization: "{{ aap_org_name }}"
    credential_type: "{{ aap_dynatrace_monaco_credential_type_name }}"
    update_secrets: "{{ aap_dynatrace_monaco_credential_overwrite }}"
    # Only seed placeholder values on first creation; preserve any user-edited credential in AAP.
    inputs: >-
      {{
        {
          'dt_platform_url': aap_dynatrace_monaco_platform_url,
          'dt_platform_token': aap_dynatrace_monaco_platform_token
        }
        if aap_dynatrace_monaco_credential_overwrite
        else (
          {
            'dt_platform_url': aap_dynatrace_monaco_platform_url,
            'dt_platform_token': aap_dynatrace_monaco_platform_token
          }
          if not aap_dynatrace_monaco_credential_exists
          else omit
