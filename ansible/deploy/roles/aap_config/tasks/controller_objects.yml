- name: "aap_config | Create custom execution environment"
  awx.awx.execution_environment:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_custom_ee_name }}"
    description: "{{ aap_custom_ee_description }}"
    image: "{{ aap_custom_ee_image }}"
    organization: "{{ aap_org_name }}"
    state: present
  register: aap_custom_ee_result

- name: "aap_config | Display custom EE registration result"
  ansible.builtin.debug:
    msg: "Custom EE registered: {{ aap_custom_ee_result.id }}"
  when: aap_custom_ee_result.id is defined

- name: "aap_config | Create OneAgent execution environment"
  awx.awx.execution_environment:
    controller_host: "{{ aap_controller_host }}"
    controller_username: "{{ aap_controller_username }}"
    controller_password: "{{ aap_controller_password }}"
    validate_certs: "{{ aap_controller_validate_certs }}"
    name: "{{ aap_oneagent_ee_name }}"
    description: "{{ aap_oneagent_ee_description }}"
