---
# dynatrace_configure role - tasks
# Configures Dynatrace monitoring for the AI Inference App

- name: "dynatrace_configure | Validate required variables"
  ansible.builtin.assert:
    that:
      - dynatrace_api_url is defined
      - dynatrace_api_url != ""
      - dynatrace_api_token is defined
      - dynatrace_api_token != ""
    fail_msg: "dynatrace_api_url and dynatrace_api_token must be set"
    success_msg: "Dynatrace credentials are present"

- name: "dynatrace_configure | Verify Dynatrace API is reachable"
  ansible.builtin.uri:
    url: "{{ dynatrace_api_url }}/api/v2/metrics"
    method: GET
    headers:
      Authorization: "Api-Token {{ dynatrace_api_token }}"
    status_code: 200
    timeout: 15
  register: dt_api_check
  failed_when: dt_api_check.status != 200

- name: "dynatrace_configure | Display API connectivity status"
  ansible.builtin.debug:
    msg: "Dynatrace API is reachable: {{ dynatrace_api_url }}"

- name: "dynatrace_configure | Configure management zone"
  ansible.builtin.uri:
    url: "{{ dynatrace_api_url }}/api/config/v1/managementZones"
    method: POST
    headers:
      Authorization: "Api-Token {{ dynatrace_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ lookup('template', 'management_zone.json.j2') }}"
    status_code: [200, 201, 400]
  register: mz_result
  failed_when: mz_result.status not in [200, 201, 400]

- name: "dynatrace_configure | Display management zone result"
  ansible.builtin.debug:
    msg: "Management zone configuration status: {{ mz_result.status }}"

- name: "dynatrace_configure | Create HTTP synthetic monitor"
  ansible.builtin.uri:
    url: "{{ dynatrace_api_url }}/api/v1/synthetic/monitors"
    method: POST
    headers:
      Authorization: "Api-Token {{ dynatrace_api_token }}"
      Content-Type: "application/json"
    body_format: json
    body: "{{ lookup('template', 'synthetic_monitor.json.j2') }}"
    status_code: [200, 201, 400]
  register: synthetic_result
  failed_when: synthetic_result.status not in [200, 201, 400]

- name: "dynatrace_configure | Display synthetic monitor result"
  ansible.builtin.debug:
    msg: "Synthetic monitor configuration status: {{ synthetic_result.status }}"

- name: "dynatrace_configure | Ingest deployment event metric"
  ansible.builtin.uri:
    url: "{{ dynatrace_api_url }}/api/v2/metrics/ingest"
    method: POST
    headers:
      Authorization: "Api-Token {{ dynatrace_api_token }}"
      Content-Type: "text/plain; charset=utf-8"
    body: |
      {{ dynatrace_metric_prefix }}.deployment,app="{{ app_name }}",version="{{ app_version }}",env="{{ app_environment }}" 1
    status_code: [200, 202]
  register: metric_result

- name: "dynatrace_configure | Display metric ingestion result"
  ansible.builtin.debug:
    msg: "Custom metric ingested successfully (status: {{ metric_result.status }})"
